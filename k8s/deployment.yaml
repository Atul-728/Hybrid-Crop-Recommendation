apiVersion: apps/v1
kind: Deployment
metadata:
  name: croporacle-app
  namespace: default
  labels:
    app: croporacle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: croporacle
  template:
    metadata:
      labels:
        app: croporacle
    spec:
      containers:
        - name: croporacle
          image: croporacle:latest
          imagePullPolicy: Never
          command: ["/bin/sh", "-c", "rm -f /app/.env.local && uvicorn Backend.main:app --host 0.0.0.0 --port 8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: croporacle-config
          env:
            - name: APP_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: croporacle-config
                  key: APP_BASE_URL
            - name: DATABASE_URL
              value: "postgresql://postgres:localpass@postgres:5432/cropdb"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: croporacle-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: croporacle
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
