apiVersion: apps/v1
kind: Deployment
metadata:
  name: croporacle-app
  namespace: default
  labels:
    app: croporacle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: croporacle
  template:
    metadata:
      labels:
        app: croporacle
    spec:
      containers:
        - name: croporacle
          image: croporacle:latest
          imagePullPolicy: Never   # Use local Minikube image
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: croporacle-config
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:localpass@postgres:5432/cropdb"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: croporacle-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: croporacle
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
