<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP — CropOracle</title>
    <meta name="description" content="Verify your email with the OTP sent to complete your CropOracle account setup.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-mid: #2d6a4f;
            --sage: #52b788;
            --lime: #95d5b2;
            --charcoal: #1c1c1e;
            --white: #ffffff;
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--charcoal); color: var(--white); min-height: 100vh; }

        .bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 60% at 80% 20%, rgba(45,106,79,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(82,183,136,0.08) 0%, transparent 60%),
                linear-gradient(180deg, #0d1208 0%, #1c1c1e 100%);
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 0 48px; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(28,28,30,0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); }
        .brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--forest-mid), var(--sage)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .brand-name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .brand-name em { color: var(--sage); font-style: normal; }

        main {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 90px 24px 40px;
        }

        .auth-box {
            width: 100%; max-width: 420px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 40px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6);
        }

        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-header .icon { font-size: 40px; margin-bottom: 12px; }
        .auth-header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .auth-header p { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.6; }
        .auth-header .email-display {
            display: inline-block; background: rgba(82,183,136,0.1);
            border: 1px solid rgba(82,183,136,0.2); color: var(--sage);
            font-size: 13px; font-weight: 600; padding: 4px 12px;
            border-radius: 100px; margin-top: 8px;
        }

        /* Timer */
        .timer-display {
            text-align: center; margin-bottom: 20px;
            font-size: 14px; font-weight: 700;
            color: rgba(255,255,255,0.5);
        }
        .timer-display .time { color: var(--sage); font-size: 20px; letter-spacing: 2px; }
        .timer-display .time.expiring { color: #e63946; }

        /* OTP boxes */
        .otp-container {
            display: flex; gap: 10px; justify-content: center;
            margin-bottom: 24px;
        }
        .otp-box {
            width: 52px; height: 60px;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--white);
            font-size: 24px; font-weight: 800;
            font-family: 'Inter', sans-serif;
            text-align: center;
            outline: none;
            transition: all 0.2s;
            caret-color: var(--sage);
        }
        .otp-box:focus { border-color: var(--sage); background: rgba(82,183,136,0.08); }
        .otp-box.filled { border-color: rgba(82,183,136,0.4); background: rgba(82,183,136,0.06); }
        .otp-box:disabled { opacity: 0.3; cursor: not-allowed; }

        .msg-error {
            background: rgba(229,9,20,0.1); border: 1px solid rgba(229,9,20,0.2);
            color: #ff6b6b; border-radius: 8px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 16px; text-align: center;
        }
        .msg-success {
            background: rgba(82,183,136,0.1); border: 1px solid rgba(82,183,136,0.2);
            color: var(--sage); border-radius: 8px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 16px; text-align: center;
        }

        .btn-submit {
            width: 100%; padding: 14px;
            background: var(--sage); color: var(--charcoal);
            font-size: 15px; font-weight: 800; font-family: 'Inter', sans-serif;
            border: none; border-radius: 10px; cursor: pointer;
            transition: all 0.3s; letter-spacing: 0.5px; text-transform: uppercase;
            display: none;
        }
        .btn-submit:hover { background: var(--lime); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(82,183,136,0.3); }
        .btn-submit:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; box-shadow: none; }

        .resend-area {
            display: none; text-align: center; margin-top: 20px;
        }
        .resend-area p { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
        .btn-resend {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            padding: 10px 24px; border-radius: 10px;
            font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-resend:hover { background: rgba(82,183,136,0.1); border-color: rgba(82,183,136,0.2); color: var(--sage); }

        .back-link {
            text-align: center; margin-top: 20px;
            font-size: 13px; color: rgba(255,255,255,0.35);
        }
        .back-link a { color: var(--sage); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="bg"></div>

<nav>
    <a href="/" class="nav-brand">
        <div class="brand-icon">🌾</div>
        <div class="brand-name">Crop<em>Oracle</em></div>
    </a>
</nav>

<main>
    <div class="auth-box">
        <div class="auth-header">
            <div class="icon">📧</div>
            <h1>Verify Your Email</h1>
            <p>We sent a 6-digit code to</p>
            <span class="email-display">{{ email }}</span>
        </div>

        <div class="timer-display">
            <div>Expires in</div>
            <div class="time" id="timer-text">5:00</div>
        </div>

        {% if error %}
            <div class="msg-error"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="msg-success"><i class="fa-solid fa-circle-check"></i> {{ success }}</div>
        {% endif %}

        <form action="/verify-otp" method="post" id="verify-form">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="otp" id="otp-hidden">

            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
            </div>

            <button type="submit" class="btn-submit" id="verify-btn">
                <i class="fa-solid fa-shield-halved"></i> Verify &amp; Continue
            </button>
        </form>

        <div class="resend-area" id="resend-area">
            <p>Code expired or didn't arrive?</p>
            <form action="/resend-otp" method="post">
                <input type="hidden" name="email" value="{{ email }}">
                <button type="submit" class="btn-resend">
                    <i class="fa-solid fa-rotate-right"></i> Resend OTP
                </button>
            </form>
        </div>

        <div class="back-link">
            <a href="/register"><i class="fa-solid fa-arrow-left" style="font-size:11px;"></i> Back to registration</a>
        </div>
    </div>
</main>

<script>
const boxes = document.querySelectorAll('.otp-box');
const timerText = document.getElementById('timer-text');
const verifyBtn = document.getElementById('verify-btn');
const resendArea = document.getElementById('resend-area');

let timeLeft = parseInt("{{ time_left | default(300) }}") || 300;

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
}

function updateTimer() {
    timerText.textContent = formatTime(timeLeft);
    timerText.className = 'time' + (timeLeft <= 30 ? ' expiring' : '');
}

function disableAll() {
    timerText.textContent = 'Expired';
    timerText.className = 'time expiring';
    boxes.forEach(b => b.disabled = true);
    verifyBtn.disabled = true;
    resendArea.style.display = 'block';
}

if (timeLeft <= 0) {
    disableAll();
} else {
    updateTimer();
    const countdown = setInterval(() => {
        if (--timeLeft <= 0) { clearInterval(countdown); disableAll(); }
        else updateTimer();
    }, 1000);
}

function syncOTP() {
    let val = '';
    boxes.forEach(b => val += b.value);
    document.getElementById('otp-hidden').value = val;
    // Show button when all 6 filled
    const allFilled = val.length === 6;
    verifyBtn.style.display = allFilled ? 'block' : 'none';
}

boxes.forEach((box, idx) => {
    box.addEventListener('input', () => {
        if (timeLeft <= 0) return;
        box.value = box.value.replace(/[^0-9]/g, '');
        if (box.value) box.classList.add('filled');
        else box.classList.remove('filled');
        syncOTP();
        if (box.value && idx < boxes.length - 1) boxes[idx + 1].focus();
        if (idx === boxes.length - 1 && box.value) {
            setTimeout(() => document.getElementById('verify-form').submit(), 100);
        }
    });
    box.addEventListener('keydown', (e) => {
        if (timeLeft <= 0) return;
        if (e.key === 'Backspace' && !box.value && idx > 0) {
            boxes[idx - 1].focus();
            boxes[idx - 1].value = '';
            boxes[idx - 1].classList.remove('filled');
            syncOTP();
        }
    });
});

// Paste support on first box
boxes[0].addEventListener('paste', (e) => {
    if (timeLeft <= 0) return;
    e.preventDefault();
    const pasted = e.clipboardData.getData('text').trim();
    if (/^\d{6}$/.test(pasted)) {
        boxes.forEach((b, i) => { b.value = pasted[i]; b.classList.add('filled'); });
        syncOTP();
        setTimeout(() => document.getElementById('verify-form').submit(), 100);
    }
});
</script>
</body>
</html>
