<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — CropOracle</title>
    <meta name="description" content="Reset your CropOracle password securely with OTP email verification.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-mid: #2d6a4f; --sage: #52b788; --lime: #95d5b2;
            --charcoal: #1c1c1e; --white: #ffffff;
            --glass: rgba(255,255,255,0.06); --glass-border: rgba(255,255,255,0.1);
        }
        /* ===== LIGHT MODE ===== */
        [data-theme="light"] {
            --charcoal: #f5f9f5;
            --white: #1a2e1a;
            --glass: rgba(255,255,255,0.92);
            --glass-border: rgba(0,0,0,0.08);
        }
        [data-theme="light"] .nav-links a { color: rgba(26,46,26,0.80) !important; }
        [data-theme="light"] .nav-links a:hover { color: #0d1f0f !important; background: rgba(45,106,79,0.09) !important; }
        [data-theme="light"] .nav-links a.active { color: #1a5c3a !important; font-weight: 700 !important; background: rgba(45,106,79,0.10) !important; border-radius: 8px !important; }
        [data-theme="light"] body { background: #f5f9f5; }
        [data-theme="light"] .bg {
            background:
                radial-gradient(ellipse 60% 60% at 80% 20%, rgba(45,106,79,0.08) 0%, transparent 60%),
                linear-gradient(180deg, #ddf0e4 0%, #f5f9f5 100%) !important;
        }
        [data-theme="light"] nav { background: rgba(245,249,245,0.95) !important; border-bottom: 1px solid rgba(0,0,0,0.07) !important; }
        [data-theme="light"] .theme-toggle { background: rgba(45,106,79,0.07) !important; border-color: rgba(0,0,0,0.1) !important; color: #2d6a4f !important; }
        [data-theme="light"] .auth-box {
            background: #ffffff !important;
            border: 1px solid rgba(0,0,0,0.07) !important;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08) !important;
        }
        [data-theme="light"] .auth-header h1 { color: #0d1f0f !important; }
        [data-theme="light"] .auth-header p { color: #5a7a5c !important; }
        [data-theme="light"] label { color: #5a7a5c !important; }
        [data-theme="light"] input[type="email"], [data-theme="light"] input[type="password"] {
            background: #f8faf8 !important;
            border: 1px solid rgba(0,0,0,0.10) !important;
            color: #0d1f0f !important;
        }
        [data-theme="light"] input::placeholder { color: #8aad8a !important; }
        [data-theme="light"] input:focus { border-color: #52b788 !important; background: #f0faf4 !important; }
        [data-theme="light"] .eye-toggle { color: #8aad8a !important; }
        [data-theme="light"] .otp-box {
            background: #f8faf8 !important;
            border: 2px solid rgba(0,0,0,0.10) !important;
            color: #0d1f0f !important;
        }
        [data-theme="light"] .otp-box:focus { border-color: #52b788 !important; background: #f0faf4 !important; }
        [data-theme="light"] .timer-text { color: #5a7a5c !important; }
        [data-theme="light"] .bar-segment { background: rgba(0,0,0,0.08) !important; }
        [data-theme="light"] button.btn-primary:disabled { background: rgba(0,0,0,0.08) !important; color: #8aad8a !important; }
        [data-theme="light"] .back-link, [data-theme="light"] .back-link a { color: #5a7a5c !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--charcoal); color: var(--white); min-height: 100vh; }

        .bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 60% at 80% 20%, rgba(45,106,79,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(82,183,136,0.08) 0%, transparent 60%),
                linear-gradient(180deg, #0d1208 0%, #1c1c1e 100%);
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 0 48px; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(28,28,30,0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); }
        .brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--forest-mid), var(--sage)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .brand-name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .brand-name span { color: var(--sage); }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-links a { text-decoration: none; color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 500; padding: 7px 13px; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.06); }
        .nav-links .cta-btn { background: var(--sage); color: var(--charcoal) !important; font-weight: 700; padding: 9px 22px; border-radius: 8px; }
        .nav-links .cta-btn:hover { background: var(--lime) !important; }
        .theme-toggle { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; padding: 7px 10px; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px; }
        .theme-toggle:hover { color: var(--sage); }

        main {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 90px 24px 40px;
        }

        .auth-box {
            width: 100%; max-width: 440px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 40px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6);
        }

        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-header .icon { font-size: 36px; margin-bottom: 12px; }
        .auth-header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        .auth-header p { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.6; }

        label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 13px 16px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: var(--white); font-size: 15px;
            font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s;
            margin-bottom: 16px;
        }
        input:focus { border-color: var(--sage); background: rgba(82,183,136,0.06); }
        input::placeholder { color: rgba(255,255,255,0.25); }

        button.btn-primary {
            width: 100%; padding: 14px;
            background: var(--sage); color: var(--charcoal);
            font-size: 15px; font-weight: 800; font-family: 'Inter', sans-serif;
            border: none; border-radius: 10px; cursor: pointer;
            transition: all 0.3s; letter-spacing: 0.5px; text-transform: uppercase;
            margin-top: 4px;
        }
        button.btn-primary:hover { background: var(--lime); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(82,183,136,0.3); }
        button.btn-primary:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; box-shadow: none; }

        .otp-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .otp-box {
            width: 50px; height: 58px; text-align: center; font-size: 22px; font-weight: 800;
            font-family: 'Inter', sans-serif; border-radius: 12px; outline: none;
            background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
            color: var(--white); caret-color: var(--sage); transition: all 0.2s;
        }
        .otp-box:focus { border-color: var(--sage); background: rgba(82,183,136,0.08); }
        .otp-box:disabled { opacity: 0.3; }

        .error-msg { background: rgba(229,9,20,0.1); border: 1px solid rgba(229,9,20,0.2); color: #ff6b6b; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
        .success-msg { background: rgba(82,183,136,0.1); border: 1px solid rgba(82,183,136,0.2); color: var(--sage); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }

        .timer-text { text-align: center; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 16px; }
        .timer-text .time { color: var(--sage); font-size: 20px; letter-spacing: 1px; }
        .timer-text .time.expiring { color: #e63946; }

        .strength-bar { display: flex; gap: 4px; margin: 8px 0 4px; }
        .bar-segment { flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; transition: background 0.3s; }
        .strength-label { font-size: 12px; font-weight: 700; min-height: 16px; margin-bottom: 12px; }

        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 46px; }
        .eye-toggle { position: absolute; right: 14px; top: 36px; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 15px; }
        .eye-toggle:hover { color: var(--sage); }

        .back-to-login { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.4); }
        .back-to-login a { color: var(--sage); text-decoration: none; font-weight: 600; }

        .resend-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7); padding: 10px 24px; border-radius: 10px;
            font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; margin: 0 auto; display: block;
        }
        .resend-btn:hover { background: rgba(82,183,136,0.1); color: var(--sage); }
    </style>
</head>
<body>
<div class="bg"></div>

<nav>
    <a href="/" class="nav-brand">
        <div class="brand-icon">🌾</div>
        <div class="brand-name">Crop<span>Oracle</span></div>
    </a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
        <a href="/login">Login</a>
        <a href="/register" class="cta-btn">Sign Up</a>
    </div>
</nav>

<main>
    <div class="auth-box">
        <div class="auth-header">
            <div class="icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Enter your email to receive a 6-digit OTP, then set a new password.</p>
        </div>

        <!-- STEP 1: Email -->
        <div id="step1">
            <label>Email Address</label>
            <input type="email" id="reset-email" placeholder="Enter your registered email" autocomplete="off">
            <p id="email-error" class="error-msg" style="display:none;"></p>
            <button type="button" class="btn-primary" id="send-otp-btn"><i class="fa-solid fa-paper-plane"></i> Send OTP</button>
        </div>

        <!-- STEP 2: OTP -->
        <div id="step2" style="display:none;">
            <p class="success-msg"><i class="fa-solid fa-circle-check"></i> OTP sent! Check your inbox.</p>
            <div class="timer-text">Expires in <div class="time" id="forgot-timer">5:00</div></div>
            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="otp-box" inputmode="numeric" autocomplete="off">
            </div>
            <p id="otp-error" class="error-msg" style="display:none;"></p>
            <button type="button" class="btn-primary" id="verify-otp-btn" style="display:none;"><i class="fa-solid fa-shield-halved"></i> Verify OTP</button>
            <div id="resend-container" style="display:none; margin-top: 16px; text-align:center;">
                <p style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:10px;">Code expired or didn't arrive?</p>
                <button type="button" class="resend-btn" id="resend-otp-btn"><i class="fa-solid fa-rotate-right"></i> Resend OTP</button>
            </div>
        </div>

        <!-- STEP 3: New Password -->
        <div id="step3" style="display:none;">
            <p class="success-msg"><i class="fa-solid fa-circle-check"></i> OTP verified! Set your new password.</p>
            <div class="password-wrap">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="Minimum 8 characters" autocomplete="new-password">
                <i class="fa-solid fa-eye eye-toggle" id="toggle-new"></i>
            </div>
            <div class="strength-bar">
                <div class="bar-segment" id="seg1"></div>
                <div class="bar-segment" id="seg2"></div>
                <div class="bar-segment" id="seg3"></div>
            </div>
            <p class="strength-label" id="strength-label"></p>
            <div class="password-wrap">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password">
                <i class="fa-solid fa-eye eye-toggle" id="toggle-confirm"></i>
            </div>
            <p id="match-error" class="error-msg" style="display:none;"></p>
            <p id="reset-error" class="error-msg" style="display:none;"></p>
            <button type="button" class="btn-primary" id="reset-btn"><i class="fa-solid fa-key"></i> Update Password</button>
        </div>

        <div class="back-to-login"><a href="/login"><i class="fa-solid fa-arrow-left" style="font-size:11px;"></i> Back to login</a></div>
    </div>
</main>

<script>
// Theme
function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); document.getElementById('theme-icon').className = t==='dark'?'fa-solid fa-moon':'fa-solid fa-sun'; localStorage.setItem('co_theme', t); }
applyTheme(localStorage.getItem('co_theme') || 'dark');
document.getElementById('theme-toggle').addEventListener('click', () => { applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); });

// Timer helpers
let timerInterval, timeLeft = 300;
function startTimer() {
    clearInterval(timerInterval); timeLeft = 300;
    const el = document.getElementById('forgot-timer');
    const verifyBtn = document.getElementById('verify-otp-btn');
    const resend = document.getElementById('resend-container');
    const boxes = document.querySelectorAll('.otp-box');
    resend.style.display = 'none'; verifyBtn.disabled = false;
    boxes.forEach(b => { b.disabled = false; b.value = ''; });
    timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft/60), s = timeLeft%60;
        el.textContent = `${m}:${s<10?'0':''}${s}`;
        el.className = 'time' + (timeLeft <= 30 ? ' expiring' : '');
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            el.textContent = 'Expired'; el.className = 'time expiring';
            verifyBtn.disabled = true;
            boxes.forEach(b => b.disabled = true);
            resend.style.display = 'block';
        }
    }, 1000);
}

function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }

// Step 1 - Send OTP
document.getElementById('send-otp-btn').addEventListener('click', async () => {
    const email = document.getElementById('reset-email').value.trim();
    showError('email-error', '');
    if (!email) { showError('email-error', 'Email is required.'); return; }
    const btn = document.getElementById('send-otp-btn');
    btn.textContent = 'Sending...'; btn.disabled = true;
    try {
        const fd = new FormData(); fd.append('email', email);
        const res = await fetch('/send-reset-otp', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            startTimer();
            document.querySelector('.otp-box').focus();
        } else { showError('email-error', data.message); }
    } catch { showError('email-error', 'Something went wrong. Try again.'); }
    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send OTP'; btn.disabled = false;
});

// OTP boxes
const otpBoxes = document.querySelectorAll('.otp-box');
const verifyBtn = document.getElementById('verify-otp-btn');

function syncOTP() {
    let val = ''; otpBoxes.forEach(b => val += b.value);
    verifyBtn.style.display = val.length === 6 ? 'block' : 'none';
    return val;
}
otpBoxes.forEach((box, idx) => {
    box.addEventListener('input', () => {
        if (timeLeft <= 0) return;
        box.value = box.value.replace(/[^0-9]/g, '');
        syncOTP();
        if (box.value && idx < otpBoxes.length - 1) otpBoxes[idx+1].focus();
        if (idx === otpBoxes.length - 1 && box.value) setTimeout(() => verifyBtn.click(), 100);
    });
    box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && idx > 0) { otpBoxes[idx-1].focus(); otpBoxes[idx-1].value = ''; syncOTP(); }
    });
});
otpBoxes[0].addEventListener('paste', e => {
    e.preventDefault();
    const val = e.clipboardData.getData('text').trim();
    if (/^\d{6}$/.test(val)) { otpBoxes.forEach((b,i) => b.value = val[i]); syncOTP(); setTimeout(() => verifyBtn.click(), 100); }
});

verifyBtn.addEventListener('click', async () => {
    const otp = syncOTP();
    showError('otp-error', '');
    if (otp.length < 6) { showError('otp-error', 'Please enter all 6 digits.'); return; }
    verifyBtn.textContent = 'Verifying...'; verifyBtn.disabled = true;
    const fd = new FormData();
    fd.append('email', document.getElementById('reset-email').value.trim());
    fd.append('otp', otp);
    try {
        const res = await fetch('/verify-reset-otp', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
            clearInterval(timerInterval);
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
        } else { showError('otp-error', data.message); }
    } catch { showError('otp-error', 'Error verifying OTP.'); }
    verifyBtn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Verify OTP'; verifyBtn.disabled = false;
});

document.getElementById('resend-otp-btn').addEventListener('click', async () => {
    const btn = document.getElementById('resend-otp-btn');
    btn.textContent = 'Resending...'; btn.disabled = true;
    const fd = new FormData(); fd.append('email', document.getElementById('reset-email').value.trim());
    try {
        const res = await fetch('/send-reset-otp', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) { startTimer(); } else { showError('otp-error', data.message); }
    } catch { showError('otp-error', 'Error sending OTP.'); }
    btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> Resend OTP'; btn.disabled = false;
});

// Step 3 - Password
const newPwd = document.getElementById('new-password');
const confPwd = document.getElementById('confirm-password');
const seg1=document.getElementById('seg1'),seg2=document.getElementById('seg2'),seg3=document.getElementById('seg3');
const strengthLabel=document.getElementById('strength-label');

newPwd.addEventListener('input', () => {
    const len = newPwd.value.length;
    if (len === 0) { [seg1,seg2,seg3].forEach(s=>s.style.background='rgba(255,255,255,0.1)'); strengthLabel.textContent=''; }
    else if (len <= 7) { seg1.style.background='#e63946'; seg2.style.background='rgba(255,255,255,0.1)'; seg3.style.background='rgba(255,255,255,0.1)'; strengthLabel.textContent='Weak'; strengthLabel.style.color='#e63946'; }
    else if (len <= 11) { seg1.style.background='#e9c46a'; seg2.style.background='#e9c46a'; seg3.style.background='rgba(255,255,255,0.1)'; strengthLabel.textContent='Medium'; strengthLabel.style.color='#e9c46a'; }
    else { seg1.style.background='#52b788'; seg2.style.background='#52b788'; seg3.style.background='#52b788'; strengthLabel.textContent='Strong'; strengthLabel.style.color='#52b788'; }
});

document.getElementById('toggle-new').addEventListener('click', function() { const t=newPwd.type==='password'?'text':'password'; newPwd.type=t; this.className=t==='password'?'fa-solid fa-eye eye-toggle':'fa-solid fa-eye-slash eye-toggle'; });
document.getElementById('toggle-confirm').addEventListener('click', function() { const t=confPwd.type==='password'?'text':'password'; confPwd.type=t; this.className=t==='password'?'fa-solid fa-eye eye-toggle':'fa-solid fa-eye-slash eye-toggle'; });

document.getElementById('reset-btn').addEventListener('click', async () => {
    showError('match-error', ''); showError('reset-error', '');
    const p = newPwd.value, c = confPwd.value;
    const isValid = /[A-Z]/.test(p) && /[a-z]/.test(p) && /[0-9]/.test(p) && /[!@#$%^&*]/.test(p);
    if (!p || p.length < 8) { showError('match-error', 'Password must be at least 8 characters.'); return; }
    if (!isValid) { showError('match-error', 'Must include uppercase, lowercase, number, and special character.'); return; }
    if (p !== c) { showError('match-error', 'Passwords do not match.'); return; }

    let otp = ''; otpBoxes.forEach(b => otp += b.value);
    const btn = document.getElementById('reset-btn');
    btn.textContent = 'Updating...'; btn.disabled = true;
    const fd = new FormData();
    fd.append('email', document.getElementById('reset-email').value.trim());
    fd.append('otp', otp); fd.append('new_password', p);
    try {
        const res = await fetch('/reset-password', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) { window.location.href = '/login?success=Password updated! Please sign in.'; }
        else { showError('reset-error', data.message); }
    } catch { showError('reset-error', 'Error updating password. Try again.'); }
    btn.innerHTML = '<i class="fa-solid fa-key"></i> Update Password'; btn.disabled = false;
});
</script>
<script src="/static/chatbot.js"></script>
</body>
</html>
