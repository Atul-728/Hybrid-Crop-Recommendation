global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # CropOracle FastAPI app (running on host at port 8081)
  - job_name: 'croporacle-app'
    static_configs:
      - targets: ['host.docker.internal:8081', 'host.docker.internal:8090']
    metrics_path: '/metrics'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']