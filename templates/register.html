<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="/static/style.css?v=5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<button class="theme-toggle" id="theme-toggle" style="position: absolute; top: 20px; right: 20px; z-index: 1000; background: #333; color: #fdd835; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer;">
    <i class="fa-solid fa-moon"></i>
</button>

<script>
    const themeToggle = document.getElementById("theme-toggle");
    const icon = themeToggle.querySelector("i");
    if (localStorage.getItem("theme") === "dark") {
        document.body.setAttribute("data-theme", "dark");
        icon.classList.replace("fa-moon", "fa-sun");
    }
    themeToggle.addEventListener("click", () => {
        if (document.body.getAttribute("data-theme") === "dark") {
            document.body.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
            icon.classList.replace("fa-sun", "fa-moon");
        } else {
            document.body.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
            icon.classList.replace("fa-moon", "fa-sun");
        }
    });
</script>
    <div class="auth-wrapper">
        <div class="auth-container">

            <h1>User Registration</h1>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            {% if success %}
            <p class="success">{{ success }}</p>
            {% endif %}

            <form action="/register" method="post" autocomplete="off" novalidate>
                <input type="text" style="display:none">
                <input type="password" style="display:none">
                
                <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 15px; display: grid;">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" id="first_name" placeholder="e.g., Atul" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" id="last_name" placeholder="e.g., Kumar" required autocomplete="off">
                    </div>
                </div>

                <label>Username</label>
                <input type="text" name="username" id="username" placeholder="Choose a unique username" autocomplete="off">
                <p id="username-status" style="margin-top: -15px; margin-bottom: 10px; font-size: 13px;"></p>
                <p id="username-error" style="color: red; font-size: 13px; margin-top: -15px; margin-bottom: 15px;"></p>

                <label>Email Address</label>
                <input type="email" name="email" id="email" placeholder="email@example.com" autocomplete="off">
                <p id="email-status" style="margin-top: -15px; margin-bottom: 10px; font-size: 13px;"></p>
                <p id="email-error" style="color: red; font-size: 13px; margin-top: -15px; margin-bottom: 15px;"></p>

                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Create a strong password" autocomplete="off">
                    <i class="fa-solid fa-eye eye" id="togglePassword"></i>
                </div>
                <p id="password-error" style="color: red; font-size: 13px; margin-top: -15px; margin-bottom: 15px;"></p>

                <div class="password-strength-container" style="margin-top: -10px; margin-bottom: 20px;">
                    <div class="strength-bar">
                        <div class="bar-segment" id="seg1"></div>
                        <div class="bar-segment" id="seg2"></div>
                        <div class="bar-segment" id="seg3"></div>
                    </div>
                    <p id="strength-text" style="font-size: 12px; margin-top: 5px;"></p>
                </div>
                
                <button type="submit">Create Account</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <span style="color: #666; font-size: 14px;">Already have an account? </span>
                <a href="/login">Login Here</a>
            </div>

        </div>
    </div>

    <script>
        const seg1 = document.getElementById("seg1");
        const seg2 = document.getElementById("seg2");
        const seg3 = document.getElementById("seg3");
        const password = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");
        const strengthText = document.getElementById("strength-text");
        const passwordError = document.getElementById("password-error");

        // Show/Hide Password
        togglePassword.addEventListener("click", function(){
            const type = password.getAttribute("type") === "password" ? "text" : "password";
            password.setAttribute("type", type);
            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
        });

        // Username Check
        document.getElementById("username").addEventListener("input", async function () {
            const username = this.value;
            const status = document.getElementById("username-status");
            const errEl = document.getElementById("username-error");
            if (username.trim() !== "") errEl.innerText = "";
            if(username.length < 3){ status.innerText = ""; return; }
            const res = await fetch(`/check-username?username=${username}`);
            const data = await res.json();
            if(data.available){
                status.innerText = "Username available";
                status.style.color = "green";
            } else {
                status.innerText = "Username already taken";
                status.style.color = "red";
            }
        });

        // Password Strength Logic
        password.addEventListener("input", () => {
            let val = password.value;
            let len = val.length;
            if (len === 0) {
                seg1.style.background = "#ddd"; seg2.style.background = "#ddd"; seg3.style.background = "#ddd";
                strengthText.innerText = "";
            } else if (len <= 7) {
                seg1.style.background = "red"; seg2.style.background = "#ddd"; seg3.style.background = "#ddd";
                strengthText.innerText = "Weak"; strengthText.style.color = "red";
            } else if (len <= 9) {
                seg1.style.background = "orange"; seg2.style.background = "orange"; seg3.style.background = "#ddd";
                strengthText.innerText = "Medium"; strengthText.style.color = "orange";
            } else {
                seg1.style.background = "green"; seg2.style.background = "green"; seg3.style.background = "green";
                strengthText.innerText = "Strong"; strengthText.style.color = "green";
            }
        });

        // Final Form Validation
        document.querySelector("form").addEventListener("submit", function(e) {
            let isValid = true; 
            const passVal = password.value;
            if (passVal.length < 8) {
                passwordError.innerText = "Password must be at least 8 characters.";
                isValid = false;
            }
            if (!isValid) e.preventDefault(); 
        });
    </script>
</body>
</html>
