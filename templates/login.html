<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Login</title>
    <link rel="stylesheet" href="/static/style.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<button class="theme-toggle" id="theme-toggle" style="position: absolute; top: 20px; right: 20px; z-index: 1000; background: #333; color: #fdd835; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer;">
    <i class="fa-solid fa-moon"></i>
</button>

<script>
    const themeToggle = document.getElementById("theme-toggle");
    const icon = themeToggle.querySelector("i");
    if (localStorage.getItem("theme") === "dark") {
        document.body.setAttribute("data-theme", "dark");
        icon.classList.replace("fa-moon", "fa-sun");
    }
    themeToggle.addEventListener("click", () => {
        if (document.body.getAttribute("data-theme") === "dark") {
            document.body.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
            icon.classList.replace("fa-sun", "fa-moon");
        } else {
            document.body.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
            icon.classList.replace("fa-moon", "fa-sun");
        }
    });
</script>
<div class="auth-wrapper">
    <div class="auth-container">

        <h1>Farmer Login</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        <form method="POST" action="/login" autocomplete="off">
            <label>Username or Email</label>
            <input type="text" name="username" placeholder="Enter username or email" required autocomplete="off">

            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="password" placeholder="Enter your password" required autocomplete="off">
                <i class="fa-solid fa-eye eye" id="togglePassword"></i>
            </div>
            
            <div style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
                <a href="/forgot-password" style="font-size: 13px;">Forgot password?</a>
            </div>

            <button type="submit">Login</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <span style="color: #666; font-size: 14px;">Don't have an account? </span>
            <a href="/register">Create Account</a>
        </div>

    </div>
</div>

<script>
    const password = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", function(){
        const type = password.getAttribute("type") === "password" ? "text" : "password";
        password.setAttribute("type", type);
        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
    });
</script>

</body>
</html>
