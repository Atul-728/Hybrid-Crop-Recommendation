<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .otp-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .otp-box { width: 45px; height: 50px; text-align: center; font-size: 22px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        .otp-box:focus { border-color: #4CAF50; box-shadow: 0 0 4px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-container" style="max-width: 450px;">
        <h1>Reset Password</h1>

        <div id="step1">
            <p style="text-align: center; font-size: 14px; color: #555; margin-bottom: 20px;">Enter your registered email address to receive an OTP.</p>
            <label>Email Address</label>
            <input type="email" id="reset-email" placeholder="Enter your email" autocomplete="off">
            <p id="email-error" style="color: red; font-size: 13px; margin-top: -15px; margin-bottom: 15px;"></p>
            <button type="button" id="send-otp-btn">Send OTP</button>
        </div>

        <div id="step2" style="display: none;">
            <p style="text-align: center; font-size: 14px; color: green; margin-bottom: 5px;">OTP sent! Check your email.</p>
            
            <p id="forgot-timer" style="font-weight: bold; color: #d32f2f; text-align: center; margin-bottom: 20px; min-height: 1.2em;"></p>
            
            <label>Enter OTP</label>
            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
            </div>
            <p id="otp-error" style="color: red; font-size: 13px; text-align: center; margin-top: -10px; margin-bottom: 15px;"></p>

            <button type="button" id="verify-otp-btn">Verify OTP</button>

            <div id="resend-container" style="display: none; text-align: center; margin-top: 15px;">
                <p style="color: #666; font-size: 14px; margin-bottom: 10px;">Code expired or didn't receive it?</p>
                <button type="button" id="resend-otp-btn" style="background: #f57c00; width: auto; padding: 10px 20px; border-radius: 8px; color: white; border: none; cursor: pointer; font-weight: bold;">Resend OTP</button>
            </div>
        </div>

        <div id="step3" style="display: none;">
            <p style="text-align: center; font-size: 14px; color: green; margin-bottom: 20px;">OTP Verified! Set your new password.</p>

            <label>New Password</label>
            <div class="password-wrapper">
                <input type="password" id="new-password" autocomplete="off">
                <i class="fa-solid fa-eye eye toggle-eye"></i>
            </div>
            <p id="password-error" style="color: red; font-size: 13px; margin-top: 5px; margin-bottom: 5px;"></p>

            <div class="password-strength-container" style="margin-bottom: 15px;">
                <div class="strength-bar">
                    <div class="bar-segment" id="seg1"></div>
                    <div class="bar-segment" id="seg2"></div>
                    <div class="bar-segment" id="seg3"></div>
                </div>
                <p id="strength-text"></p>
            </div>

            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirm-password" autocomplete="off">
                <i class="fa-solid fa-eye eye toggle-eye"></i>
            </div>
            <p id="match-error" style="color: red; font-size: 13px; margin-top: 5px; margin-bottom: 15px;"></p>

            <p id="reset-error" style="color: red; font-size: 13px; text-align: center;"></p>
            <button type="button" id="reset-btn">Update Password</button>
        </div>

        <div class="auth-links" style="text-align: center; margin-top: 20px;">
            <a href="/login">Back to Login</a>
        </div>
    </div>
</div>

<script>
    // --- TIMER LOGIC (Set to 40 seconds for testing) ---
    let countdownInterval;
    let timeLeft = 300; 

    function startTimer() {
        clearInterval(countdownInterval);
        timeLeft = 300;
        
        const timerElement = document.getElementById("forgot-timer");
        const verifyBtn = document.getElementById("verify-otp-btn");
        const resendContainer = document.getElementById("resend-container");
        const otpBoxes = document.querySelectorAll(".otp-box");

        verifyBtn.disabled = false;
        verifyBtn.style.background = "";
        verifyBtn.style.cursor = "pointer";
        resendContainer.style.display = "none";
        document.getElementById("otp-error").innerText = "";
        otpBoxes.forEach(b => { b.disabled = false; b.value = ""; });

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerElement.innerText = `Time left: ${m}:${s < 10 ? '0' : ''}${s}`;
        }

        updateDisplay();

        countdownInterval = setInterval(() => {
            timeLeft--;
            if(timeLeft <= 0) {
                clearInterval(countdownInterval);
                timerElement.innerText = "OTP Expired";
                verifyBtn.disabled = true;
                verifyBtn.style.background = "#ccc";
                verifyBtn.style.cursor = "not-allowed";
                otpBoxes.forEach(b => b.disabled = true);
                resendContainer.style.display = "block"; 
            } else {
                updateDisplay();
            }
        }, 1000);
    }

    // --- STEP 1: SEND OTP ---
    const sendOtpBtn = document.getElementById("send-otp-btn");
    const emailInput = document.getElementById("reset-email");
    const emailError = document.getElementById("email-error");

    // NEW: Enter key on Email Input
    emailInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            sendOtpBtn.click();
        }
    });

    sendOtpBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        emailError.innerText = "";
        if(email === "") { emailError.innerText = "Email is required."; return; }

        sendOtpBtn.innerText = "Checking...";
        sendOtpBtn.disabled = true;

        const formData = new FormData();
        formData.append("email", email);

        try {
            const res = await fetch("/send-reset-otp", { method: "POST", body: formData });
            const data = await res.json();
            if(data.success) {
                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "block";
                startTimer(); 
                document.querySelector(".otp-box").focus();
            } else {
                emailError.innerText = data.message; 
            }
        } catch (err) { emailError.innerText = "Something went wrong. Try again."; }
        
        sendOtpBtn.innerText = "Send OTP";
        sendOtpBtn.disabled = false;
    });

    // --- RESEND OTP BUTTON LOGIC ---
    document.getElementById("resend-otp-btn").addEventListener("click", async () => {
        const resendBtn = document.getElementById("resend-otp-btn");
        resendBtn.innerText = "Sending...";
        resendBtn.disabled = true;

        const formData = new FormData();
        formData.append("email", emailInput.value.trim());

        try {
            const res = await fetch("/send-reset-otp", { method: "POST", body: formData });
            const data = await res.json();
            if(data.success) {
                startTimer(); 
            } else {
                document.getElementById("otp-error").innerText = data.message;
            }
        } catch (err) {
            document.getElementById("otp-error").innerText = "Error sending OTP.";
        }
        resendBtn.innerText = "Resend OTP";
        resendBtn.disabled = false;
    });

    // --- STEP 2: OTP LOGIC (AUTO-SUBMIT ON PASTE & 6TH DIGIT) ---
    const boxes = document.querySelectorAll(".otp-box");
    const verifyOtpBtn = document.getElementById("verify-otp-btn");
    const otpError = document.getElementById("otp-error");

    boxes[0].addEventListener("paste", (e) => {
        if(timeLeft <= 0) return;
        e.preventDefault();
        const pastedData = e.clipboardData.getData("text").trim();
        if (/^\d{6}$/.test(pastedData)) {
            boxes.forEach((box, i) => box.value = pastedData[i]);
            verifyOtpBtn.click(); // Auto-verify on paste
        }
    });

    boxes.forEach((box, index) => {
        box.addEventListener("input", () => {
            if(timeLeft <= 0) return;
            box.value = box.value.replace(/[^0-9]/g, ''); 
            
            if (box.value.length === 1 && index < boxes.length - 1) {
                boxes[index + 1].focus();
            }
            
            // Auto-verify when the last box is filled
            if (index === boxes.length - 1 && box.value !== "") {
                verifyOtpBtn.click(); 
            }
        });
        
        box.addEventListener("keydown", (e) => {
            if(timeLeft <= 0) return;
            if (e.key === "Backspace" && box.value === "" && index > 0) {
                boxes[index - 1].focus();
            }
            // Verify on Enter key press
            if (e.key === "Enter") {
                e.preventDefault();
                verifyOtpBtn.click();
            }
        });
    });
    
    verifyOtpBtn.addEventListener("click", async () => {
        let otp = "";
        boxes.forEach(b => otp += b.value);
        otpError.innerText = "";

        if(otp.length < 6) { otpError.innerText = "Please enter complete OTP."; return; }

        verifyOtpBtn.innerText = "Verifying...";
        verifyOtpBtn.disabled = true;

        const formData = new FormData();
        formData.append("email", emailInput.value.trim());
        formData.append("otp", otp);

        try {
            const res = await fetch("/verify-reset-otp", { method: "POST", body: formData });
            const data = await res.json();
            if(data.success) {
                clearInterval(countdownInterval); 
                document.getElementById("step2").style.display = "none";
                document.getElementById("step3").style.display = "block";
            } else {
                otpError.innerText = data.message;
            }
        } catch(err) { otpError.innerText = "Error verifying OTP."; }
        
        verifyOtpBtn.innerText = "Verify OTP";
        verifyOtpBtn.disabled = false;
    });

    // --- STEP 3: NEW PASSWORD (STRENGTH, MATCH & ENTER KEY) ---
    const newPassword = document.getElementById("new-password");
    const confirmPassword = document.getElementById("confirm-password");
    const matchError = document.getElementById("match-error");
    const passwordError = document.getElementById("password-error");
    
    const seg1 = document.getElementById("seg1");
    const seg2 = document.getElementById("seg2");
    const seg3 = document.getElementById("seg3");
    const strengthText = document.getElementById("strength-text");

    // Eye Toggles
    document.querySelectorAll(".toggle-eye").forEach(icon => {
        icon.addEventListener("click", function() {
            const input = this.previousElementSibling;
            const type = input.getAttribute("type") === "password" ? "text" : "password";
            input.setAttribute("type", type);
            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
        });
    });

    confirmPassword.addEventListener("input", () => {
        if(confirmPassword.value === "") matchError.innerText = "";
        else if (confirmPassword.value !== newPassword.value) matchError.innerText = "Passwords do not match.";
        else matchError.innerText = ""; 
    });

    newPassword.addEventListener("input", () => {
        let val = newPassword.value;
        let len = val.length;
        
        if(confirmPassword.value !== "") {
            if(confirmPassword.value !== val) matchError.innerText = "Passwords do not match.";
            else matchError.innerText = "";
        }

        let isLength = len >= 8;
        let isUpper = /[A-Z]/.test(val);
        let isLower = /[a-z]/.test(val);
        let isNum = /[0-9]/.test(val);
        let isSym = /[!@#$%^&*]/.test(val);
        let isAllRulesMet = isUpper && isLower && isNum && isSym;

        if (len === 0) {
            seg1.style.background = "#ddd"; seg2.style.background = "#ddd"; seg3.style.background = "#ddd";
            strengthText.innerText = "";
        } else if (len <= 7) {
            seg1.style.background = "red"; seg2.style.background = "#ddd"; seg3.style.background = "#ddd";
            strengthText.innerText = "Weak Password"; strengthText.style.color = "red";
        } else if (len <= 9) {
            seg1.style.background = "orange"; seg2.style.background = "orange"; seg3.style.background = "#ddd";
            strengthText.innerText = "Medium Password"; strengthText.style.color = "orange";
        } else {
            seg1.style.background = "green"; seg2.style.background = "green"; seg3.style.background = "green";
            strengthText.innerText = "Strong Password"; strengthText.style.color = "green";
        }

        if (passwordError.innerText !== "") {
            if (val === "") passwordError.innerText = "Password is required.";
            else if (!isAllRulesMet) passwordError.innerText = "Password must include uppercase, lowercase, number, and special character.";
            else if (!isLength) passwordError.innerText = "Password must be at least 8 characters long.";
            else passwordError.innerText = "";
        }
    });

    const resetBtn = document.getElementById("reset-btn");
    const resetError = document.getElementById("reset-error");

    // NEW: Enter key logic for Step 3
    const triggerResetOnEnter = (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            resetBtn.click(); // Enter dabate hi button click trigger ho jayega
        }
    };
    newPassword.addEventListener("keydown", triggerResetOnEnter);
    confirmPassword.addEventListener("keydown", triggerResetOnEnter);

    resetBtn.addEventListener("click", async () => {
        let otp = "";
        boxes.forEach(b => otp += b.value);
        let passVal = newPassword.value;
        let confPass = confirmPassword.value;

        resetError.innerText = "";
        passwordError.innerText = "";
        matchError.innerText = "";

        let isLength = passVal.length >= 8;
        let isAllRulesMet = /[A-Z]/.test(passVal) && /[a-z]/.test(passVal) && /[0-9]/.test(passVal) && /[!@#$%^&*]/.test(passVal);

        let isValid = true;

        if (passVal === "") { passwordError.innerText = "Password is required."; isValid = false; }
        else if (!isAllRulesMet) { passwordError.innerText = "Password must include uppercase, lowercase, number, and special character."; isValid = false; }
        else if (!isLength) { passwordError.innerText = "Password must be at least 8 characters long."; isValid = false; }

        if (passVal !== confPass) { matchError.innerText = "Passwords do not match."; isValid = false; }

        if(!isValid) return;

        resetBtn.innerText = "Updating...";
        resetBtn.disabled = true;

        const formData = new FormData();
        formData.append("email", emailInput.value.trim());
        formData.append("otp", otp);
        formData.append("new_password", passVal);

        try {
            const res = await fetch("/reset-password", { method: "POST", body: formData });
            const data = await res.json();
            if(data.success) {
                alert("Password updated successfully! Please login.");
                window.location.href = "/login";
            } else {
                resetError.innerText = data.message;
            }
        } catch(err) { resetError.innerText = "Error updating password."; }
        
        resetBtn.innerText = "Update Password";
        resetBtn.disabled = false;
    });
</script>

</body>
</html>
